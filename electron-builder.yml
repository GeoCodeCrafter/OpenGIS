appId: com.opengis.app
productName: OpenGIS
directories:
  buildResources: assets
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
win:
  target:
    - nsis
    - portable
  icon: assets/icons/icon.png
mac:
  target:
    - dmg
    - zip
  icon: assets/icons/icon.png
  category: public.app-category.utilities
linux:
  target:
    - AppImage
    - deb
  icon: assets/icons/icon.png
  category: Science
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
  owner: GeoCodeCrafter
  repo: OpenGIS
